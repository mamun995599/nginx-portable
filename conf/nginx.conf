worker_processes auto;
daemon off;

events {
    worker_connections 1024;
}

# RTMP Configuration
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        # Live streaming application
        application live {
            live on;
            record off;
            
            # Allow publishing from any
            allow publish all;
            allow play all;
            
            # HLS
            hls on;
            hls_path /data/data/com.termux/files/home/nginx-portable/html/hls;
            hls_fragment 3;
            hls_playlist_length 60;
        }
        
        # Recording application
        application rec {
            live on;
            record all;
            record_path /data/data/com.termux/files/home/nginx-portable/recordings;
            record_unique on;
        }
    }
}

# HTTP Configuration
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    
    server {
        listen 8080;
        server_name localhost;
        
        # Root directory
        location / {
            root /data/data/com.termux/files/home/nginx-portable/html;
            index index.html;
        }
        
        # HLS streaming
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /data/data/com.termux/files/home/nginx-portable/html;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
        
        # RTMP statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        
        location /stat.xsl {
            root /data/data/com.termux/files/home/nginx-portable/html;
        }
    }
}
