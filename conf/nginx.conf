worker_processes auto;
daemon off;

error_log /data/data/com.termux/files/home/nginx-portable/logs/error.log warn;
pid /data/data/com.termux/files/home/nginx-portable/logs/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        buflen 1s;
        ping 30s;
        ping_timeout 10s;
        timeout 60s;
        drop_idle_publisher 30s;

        application live {
            live on;
            record off;
            allow publish all;
            allow play all;
            interleave on;
            wait_key on;
            wait_video on;
            sync 300ms;

            hls on;
            hls_path /storage/emulated/0/htdocs/hls/live;
            hls_fragment 3s;
            hls_playlist_length 60s;
            hls_sync 100ms;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;

            dash on;
            dash_path /storage/emulated/0/htdocs/dash/live;
            dash_fragment 3s;
            dash_playlist_length 60s;
            dash_cleanup on;
            dash_nested on;
        }

        application rec {
            live on;
            record all;
            record_path /storage/emulated/0/recordings;
            record_unique on;
            record_suffix _%Y%m%d_%H%M%S.flv;
            record_max_size 500M;
        }

        application restream {
            live on;
            record off;
        }

        application private {
            live on;
            record off;
            hls on;
            hls_path /storage/emulated/0/htdocs/hls/private;
            hls_fragment 3s;
            hls_playlist_length 30s;
            hls_nested on;
        }
    }
}

http {
    include mime.types;
    default_type application/octet-stream;
    charset utf-8;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    client_body_buffer_size 128k;
    client_max_body_size 500M;
    autoindex on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/vnd.apple.mpegurl video/mp2t;

    access_log /data/data/com.termux/files/home/nginx-portable/logs/access.log;

    server {
        listen 8080 default_server;
        server_name localhost _;

        root /storage/emulated/0/htdocs;
        index index.php index.html index.htm;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass unix:/data/data/com.termux/files/home/nginx-portable/php/var/run/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_read_timeout 300s;
        }

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /storage/emulated/0/htdocs/hls;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /dash {
            types {
                application/dash+xml mpd;
                video/mp4 m4v mp4 m4s;
            }
            alias /storage/emulated/0/htdocs/dash;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Access-Control-Allow-Origin "*" always;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            add_header Refresh "3; $request_uri";
        }

        location /stat.xsl {
            alias /storage/emulated/0/htdocs/stat.xsl;
        }

        location /control {
            rtmp_control all;
        }

        location /recordings {
            alias /storage/emulated/0/recordings;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        location /api {
            alias /storage/emulated/0/htdocs/api;
            location ~ \.php$ {
                fastcgi_pass unix:/data/data/com.termux/files/home/nginx-portable/php/var/run/php-fpm.sock;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                include fastcgi_params;
            }
        }

        location /uploads {
            alias /storage/emulated/0/htdocs/uploads;
            location ~ \.php$ { deny all; }
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
            expires 30d;
            access_log off;
        }

        location ~ /\. { deny all; }
        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt { access_log off; log_not_found off; }
    }
}
