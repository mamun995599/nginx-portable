[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
implicit_flush = Off
serialize_precision = -1
zend.enable_gc = On
expose_php = On
max_execution_time = 30
max_input_time = 60
memory_limit = 128M
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /data/data/com.termux/files/home/nginx-portable/php/var/log/php-error.log
post_max_size = 100M
default_mimetype = "text/html"
default_charset = "UTF-8"
file_uploads = On
upload_tmp_dir = /data/data/com.termux/files/home/nginx-portable/php/tmp
upload_max_filesize = 100M
max_file_uploads = 20
allow_url_fopen = On
allow_url_include = Off
default_socket_timeout = 60
date.timezone = UTC

[Session]
session.save_handler = files
session.save_path = "/data/data/com.termux/files/home/nginx-portable/php/tmp"
session.use_strict_mode = 0
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440
