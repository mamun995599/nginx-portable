[global]
pid = /data/data/com.termux/files/home/nginx-portable/php/var/run/php-fpm.pid
error_log = /data/data/com.termux/files/home/nginx-portable/php/var/log/php-fpm.log
log_level = notice
daemonize = no

[www]
listen = /data/data/com.termux/files/home/nginx-portable/php/var/run/php-fpm.sock
listen.mode = 0666

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

env[TMP] = /data/data/com.termux/files/home/nginx-portable/php/tmp
env[TMPDIR] = /data/data/com.termux/files/home/nginx-portable/php/tmp
env[TEMP] = /data/data/com.termux/files/home/nginx-portable/php/tmp

; Force PHP to use portable php.ini settings
php_admin_value[mysqli.default_socket] = /data/data/com.termux/files/home/nginx-portable/mysql/run/mysqld.sock
php_admin_value[pdo_mysql.default_socket] = /data/data/com.termux/files/home/nginx-portable/mysql/run/mysqld.sock
php_admin_value[mysql.default_socket] = /data/data/com.termux/files/home/nginx-portable/mysql/run/mysqld.sock
php_admin_value[error_log] = /data/data/com.termux/files/home/nginx-portable/php/var/log/php-error.log
php_admin_value[session.save_path] = /data/data/com.termux/files/home/nginx-portable/php/tmp
php_admin_value[upload_tmp_dir] = /data/data/com.termux/files/home/nginx-portable/php/tmp
